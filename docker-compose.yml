# Production: behind reverse proxy (Caddy/Nginx) — expose only to Docker network
services:
  intello:
    build: .
    container_name: intello
    restart: unless-stopped
    networks:
      - web
    expose:
      - "8000"
    # For standalone (no reverse proxy), uncomment:
    # ports:
    #   - "8000:8000"
    env_file:
      - .env
    volumes:
      - intello-data:/data
    deploy:
      resources:
        limits:
          memory: 3G

volumes:
  intello-data:

networks:
  web:
    external: true
