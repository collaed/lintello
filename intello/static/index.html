<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>L'Intello</title>
<style>
  :root { --bg: #0a0a0f; --surface: #141419; --surface2: #1c1c24; --border: #2a2a35;
           --text: #ececf1; --muted: #8e8ea0; --accent: #7c6cf0; --accent2: #9b8afb;
           --green: #10b981; --red: #ef4444; --yellow: #f59e0b; --blue: #3b82f6;
           --radius: 12px; --max-w: 768px; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Söhne', -apple-system, 'Segoe UI', sans-serif; background: var(--bg);
         color: var(--text); height: 100dvh; display: flex; overflow: hidden; }

  /* Sidebar */
  .sidebar { width: 260px; background: var(--surface); border-right: 1px solid var(--border);
             display: flex; flex-direction: column; flex-shrink: 0; transition: margin .2s; }
  .sidebar.collapsed { margin-left: -260px; }
  .sidebar-header { padding: 14px 16px; display: flex; justify-content: space-between; align-items: center; }
  .sidebar-header h2 { font-size: .9rem; font-weight: 600; }
  .new-chat { background: var(--surface2); border: 1px solid var(--border); color: var(--text);
              padding: 10px 14px; border-radius: var(--radius); cursor: pointer; width: 100%;
              text-align: left; font-size: .85rem; margin: 0 12px 8px; width: calc(100% - 24px); }
  .new-chat:hover { background: var(--border); }
  .conv-list { flex: 1; overflow-y: auto; padding: 4px 8px; }
  .conv-item { padding: 10px 12px; border-radius: 8px; cursor: pointer; font-size: .85rem;
               color: var(--muted); margin-bottom: 2px; white-space: nowrap; overflow: hidden;
               text-overflow: ellipsis; }
  .conv-item:hover { background: var(--surface2); color: var(--text); }
  .conv-item.active { background: var(--surface2); color: var(--text); }
  .sidebar-nav { padding: 12px; border-top: 1px solid var(--border); display: flex; gap: 6px; flex-wrap: wrap; }
  .sidebar-nav a { color: var(--muted); font-size: .8rem; text-decoration: none; padding: 4px 8px;
                   border-radius: 6px; background: var(--surface2); }
  .sidebar-nav a:hover { color: var(--text); background: var(--border); }

  /* Main area */
  .main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
  .topbar { padding: 10px 16px; display: flex; align-items: center; gap: 8px; border-bottom: 1px solid var(--border); }
  .topbar .toggle { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 1.2rem; padding: 4px; }
  .topbar .mode-select { background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
                          padding: 5px 10px; border-radius: 8px; font-size: .8rem; }
  .topbar .provider-btn { margin-left: auto; background: var(--surface2); border: 1px solid var(--border);
                           color: var(--muted); padding: 5px 12px; border-radius: 8px; font-size: .8rem; cursor: pointer; }

  /* Chat */
  .chat { flex: 1; overflow-y: auto; padding: 24px 16px; }
  .chat-inner { max-width: var(--max-w); margin: 0 auto; }
  .msg { padding: 16px 0; line-height: 1.7; font-size: .95rem; }
  .msg + .msg { border-top: 1px solid var(--border); }
  .msg .role { font-size: .75rem; font-weight: 600; text-transform: uppercase; letter-spacing: .05em;
               margin-bottom: 6px; }
  .msg .role.user { color: var(--accent2); }
  .msg .role.assistant { color: var(--green); }
  .msg .role.system { color: var(--muted); }
  .msg .content { white-space: pre-wrap; word-wrap: break-word; }
  .msg .meta { font-size: .75rem; color: var(--muted); margin-top: 8px; }
  .msg .meta .model { color: var(--green); }
  .msg .meta .cost { color: var(--yellow); }
  .msg .feedback { display: inline-flex; gap: 2px; margin-left: 8px; }
  .msg .feedback button { background: none; border: 1px solid var(--border); color: var(--muted);
                           padding: 1px 6px; border-radius: 4px; cursor: pointer; font-size: .7rem; }
  .msg .feedback button:hover { border-color: var(--accent); color: var(--accent); }
  .plan-box { background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius);
              padding: 12px 16px; margin: 8px 0; font-size: .8rem; color: var(--muted); }

  /* Input */
  .input-area { padding: 12px 16px 20px; }
  .input-box { max-width: var(--max-w); margin: 0 auto; background: var(--surface2); border: 1px solid var(--border);
               border-radius: 16px; display: flex; align-items: flex-end; padding: 8px 12px; gap: 8px;
               transition: border-color .2s; }
  .input-box:focus-within { border-color: var(--accent); }
  .input-box textarea { flex: 1; background: none; border: none; color: var(--text); font-size: .95rem;
                         resize: none; outline: none; min-height: 24px; max-height: 200px; line-height: 1.5;
                         font-family: inherit; padding: 4px 0; }
  .input-box textarea::placeholder { color: var(--muted); }
  .input-tools { display: flex; gap: 4px; align-items: center; padding-bottom: 2px; }
  .input-tools button, .input-tools label { background: none; border: none; color: var(--muted);
                                             cursor: pointer; font-size: 1.1rem; padding: 4px;
                                             border-radius: 6px; display: flex; }
  .input-tools button:hover, .input-tools label:hover { background: var(--border); color: var(--text); }
  .send-btn { background: var(--accent); color: #fff; border: none; width: 32px; height: 32px;
              border-radius: 8px; cursor: pointer; font-size: 1rem; display: flex; align-items: center;
              justify-content: center; flex-shrink: 0; }
  .send-btn:disabled { opacity: .3; cursor: default; }
  .send-btn:hover:not(:disabled) { background: var(--accent2); }
  .attach-info { max-width: var(--max-w); margin: 4px auto 0; font-size: .75rem; color: var(--muted);
                 display: flex; gap: 8px; }
  .attach-tag { background: var(--surface2); border: 1px solid var(--border); padding: 2px 8px;
                border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; }
  .attach-tag .x { cursor: pointer; color: var(--red); }

  /* Empty state */
  .empty { text-align: center; padding: 80px 20px; }
  .empty h1 { font-size: 1.8rem; font-weight: 600; margin-bottom: 8px; }
  .empty h1 span { color: var(--accent); }
  .empty p { color: var(--muted); font-size: .95rem; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 768px) {
    .sidebar { position: fixed; z-index: 20; height: 100%; }
    .sidebar.collapsed { margin-left: -260px; }
  }
</style>
</head>
<body>

<!-- Sidebar -->
<aside class="sidebar" id="sidebar">
  <div class="sidebar-header">
    <h2>⚡ L'Intello</h2>
    <button onclick="toggleSidebar()" style="background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem">✕</button>
  </div>
  <button class="new-chat" onclick="newConversation()">+ New chat</button>
  <div class="conv-list" id="convList"></div>
  <div class="sidebar-nav">
    <a href="/literary">📚 Literary</a>
    <a href="/corkboard">📌 Board</a>
    <a href="/gdrive">📁 Drive</a>
    <a href="#" onclick="openProviders()">⚙️ Providers</a>
  </div>
</aside>

<!-- Main -->
<div class="main">
  <div class="topbar">
    <button class="toggle" onclick="toggleSidebar()">☰</button>
    <select class="mode-select" id="modeSelect">
      <option value="auto">⚡ Auto</option>
      <option value="fast">🏃 Fast</option>
      <option value="deep">🔬 Deep</option>
      <option value="debate">⚔️ Debate</option>
    </select>
    <label style="display:flex;align-items:center;gap:4px;font-size:.8rem;color:var(--muted);cursor:pointer">
      <input type="checkbox" id="streamToggle"> Stream
    </label>
    <button class="provider-btn" onclick="openProviders()">Providers</button>
  </div>

  <div class="chat" id="chat">
    <div class="chat-inner" id="chatInner">
      <div class="empty">
        <h1>⚡ <span>L'Intello</span></h1>
        <p>Smart AI backend — ask anything</p>
      </div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <div class="input-tools">
        <label title="Attach file">📎<input type="file" id="fileInput" hidden></label>
        <button title="Google Drive" onclick="promptGDrive()">🔗</button>
      </div>
      <textarea id="prompt" rows="1" placeholder="Message L'Intello..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()">➤</button>
    </div>
    <div class="attach-info" id="attachInfo"></div>
  </div>
</div>

<!-- Provider Modal (reuse existing logic) -->
<div id="providerModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:30;align-items:center;justify-content:center">
  <div style="background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:24px;width:500px;max-height:80vh;overflow-y:auto">
    <div style="display:flex;justify-content:space-between;margin-bottom:16px">
      <h2 style="font-size:1rem">Providers</h2>
      <span onclick="closeProviders()" style="cursor:pointer;color:var(--muted);font-size:1.2rem">✕</span>
    </div>
    <div id="providerList"></div>
    <hr style="border-color:var(--border);margin:16px 0">
    <h3 style="font-size:.9rem;margin-bottom:8px">Add API Key</h3>
    <input type="text" id="keyName" placeholder="ENV variable" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;width:100%;margin:4px 0;font-size:.85rem">
    <input type="text" id="keyValue" placeholder="Key value" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px;border-radius:8px;width:100%;margin:4px 0;font-size:.85rem">
    <button onclick="addKey()" style="background:var(--accent);color:#fff;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:.85rem;margin-top:4px">Add Key</button>
  </div>
</div>

<script>
const chatEl = document.getElementById('chat');
const chatInner = document.getElementById('chatInner');
const promptEl = document.getElementById('prompt');
const fileInput = document.getElementById('fileInput');
let attachedFile = null, gdriveUrl = '', conversationId = null;

function autoResize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 200) + 'px'; }
function handleKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('collapsed'); }

fileInput.addEventListener('change', () => { attachedFile = fileInput.files[0] || null; renderAttach(); });
function promptGDrive() { const u = prompt('Google Drive URL:'); if (u) { gdriveUrl = u; renderAttach(); } }
function renderAttach() {
  let h = '';
  if (attachedFile) h += `<span class="attach-tag">📄 ${attachedFile.name} <span class="x" onclick="attachedFile=null;fileInput.value='';renderAttach()">✕</span></span>`;
  if (gdriveUrl) h += `<span class="attach-tag">🔗 GDrive <span class="x" onclick="gdriveUrl='';renderAttach()">✕</span></span>`;
  document.getElementById('attachInfo').innerHTML = h;
}

function addMsg(role, html, meta) {
  // Remove empty state
  const empty = chatInner.querySelector('.empty'); if (empty) empty.remove();
  const d = document.createElement('div'); d.className = 'msg';
  d.innerHTML = `<div class="role ${role}">${role}</div><div class="content">${html}</div>${meta ? `<div class="meta">${meta}</div>` : ''}`;
  chatInner.appendChild(d);
  chatEl.scrollTop = chatEl.scrollHeight;
  return d;
}

function newConversation() { conversationId = null; chatInner.innerHTML = '<div class="empty"><h1>⚡ <span>L\'Intello</span></h1><p>Smart AI backend — ask anything</p></div>'; }

async function send(confirmPaid, savedPrompt) {
  const text = savedPrompt || promptEl.value.trim();
  if (!text && !confirmPaid) return;
  if (!confirmPaid) { addMsg('user', esc(text)); promptEl.value = ''; promptEl.style.height = 'auto'; }

  const fd = new FormData();
  fd.append('prompt', text);
  fd.append('confirm_paid', confirmPaid ? 'true' : 'false');
  fd.append('mode', document.getElementById('modeSelect').value);
  if (conversationId) fd.append('conversation_id', conversationId);
  if (attachedFile) { fd.append('file', attachedFile); attachedFile = null; fileInput.value = ''; renderAttach(); }
  if (gdriveUrl) { fd.append('gdrive_url', gdriveUrl); gdriveUrl = ''; renderAttach(); }

  const btn = document.getElementById('sendBtn'); btn.disabled = true;
  const loading = addMsg('system', '⏳ Thinking...');

  // Streaming mode
  if (document.getElementById('streamToggle').checked && !confirmPaid) {
    try {
      const r = await fetch('/v1/chat/completions/stream', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({messages: [{role: 'user', content: text}], max_tokens: 4096}),
      });
      chatInner.removeChild(loading);
      const msgEl = addMsg('assistant', '');
      const contentEl = msgEl.querySelector('.content');
      const reader = r.body.getReader();
      const decoder = new TextDecoder();
      let fullText = '';
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (line.startsWith('data: ')) {
            try {
              const d = JSON.parse(line.slice(6));
              if (d.content) { fullText += d.content; contentEl.textContent = fullText; chatEl.scrollTop = chatEl.scrollHeight; }
              if (d.done && d.provider) { msgEl.innerHTML += `<div class="meta"><span class="model">${d.provider}</span> · ${d.model || ''} · streamed</div>`; }
            } catch(e) {}
          }
        }
      }
    } catch(e) { chatInner.removeChild(loading); addMsg('system', `❌ ${esc(e.message)}`); }
    btn.disabled = false;
    return;
  }

  try {
    const r = await fetch('/api/prompt', { method: 'POST', body: fd });
    const data = await r.json();
    chatInner.removeChild(loading);

    if (data.plan) {
      if (data.plan.conversation_id) conversationId = data.plan.conversation_id;
      const plan = document.createElement('div'); plan.className = 'plan-box';
      plan.textContent = data.plan.reasoning;
      chatInner.appendChild(plan);
    }

    if (data.needs_confirmation) {
      addMsg('system', `⚠️ Paid model: ${data.plan.primary} — $${data.plan.estimated_cost.toFixed(6)}
<button onclick="send(true,'${esc(text)}')" style="background:var(--green);color:#fff;border:none;padding:4px 12px;border-radius:6px;cursor:pointer;margin-top:6px">Proceed</button>
<button onclick="this.parentElement.parentElement.remove()" style="background:var(--surface2);color:var(--text);border:1px solid var(--border);padding:4px 12px;border-radius:6px;cursor:pointer;margin-left:4px">Cancel</button>`);
    } else if (data.error) {
      addMsg('system', `❌ ${esc(data.error)}`);
    } else if (data.response) {
      const r = data.response;
      const meta = `<span class="model">${esc(r.provider)}</span> · ${esc(r.model)} · ${r.input_tokens}→${r.output_tokens} tokens · <span class="cost">$${r.cost.toFixed(6)}</span>${data.mode !== 'fast' ? ` · ${data.mode}` : ''}`;
      addMsg('assistant', esc(r.content), meta);
    }
    loadConversations();
  } catch (e) {
    chatInner.removeChild(loading);
    addMsg('system', `❌ ${esc(e.message)}`);
  }
  btn.disabled = false;
}

// Conversations
async function loadConversations() {
  try {
    const r = await fetch('/api/conversations');
    const convs = await r.json();
    const el = document.getElementById('convList');
    el.innerHTML = convs.map(c => {
      const d = new Date(c.created_at * 1000);
      const label = c.summary ? c.summary.substring(0, 40) : d.toLocaleDateString();
      const active = c.id === conversationId ? ' active' : '';
      return `<div class="conv-item${active}" onclick="loadConv('${c.id}')">${esc(label)}</div>`;
    }).join('');
  } catch(e) {}
}

async function loadConv(id) {
  conversationId = id;
  chatInner.innerHTML = '';
  const r = await fetch(`/api/conversations/${id}`);
  const data = await r.json();
  if (data.summary) { const p = document.createElement('div'); p.className = 'plan-box'; p.textContent = data.summary; chatInner.appendChild(p); }
  for (const m of data.messages) addMsg(m.role === 'user' ? 'user' : 'assistant', esc(m.content));
  loadConversations();
}

// Providers
function openProviders() { document.getElementById('providerModal').style.display = 'flex'; refreshProviders(); }
function closeProviders() { document.getElementById('providerModal').style.display = 'none'; }
async function refreshProviders() {
  const r = await fetch('/api/providers');
  const providers = await r.json();
  document.getElementById('providerList').innerHTML = '<table style="width:100%;font-size:.8rem;border-collapse:collapse">' +
    '<tr><th style="text-align:left;padding:4px">Provider</th><th>Status</th><th>Quota</th></tr>' +
    providers.map(p => {
      const s = p.available ? '🟢' : '🔴';
      const q = p.daily_limit > 0 ? `${p.remaining}/${p.daily_limit}` : '∞';
      return `<tr><td style="padding:4px">${esc(p.name)}</td><td style="text-align:center">${s}</td><td style="text-align:center;color:var(--muted)">${q}</td></tr>`;
    }).join('') + '</table>';
}
async function addKey() {
  const fd = new FormData();
  fd.append('env_key', document.getElementById('keyName').value);
  fd.append('value', document.getElementById('keyValue').value);
  await fetch('/api/key', { method: 'POST', body: fd });
  document.getElementById('keyName').value = '';
  document.getElementById('keyValue').value = '';
  refreshProviders();
}

function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

// Init
loadConversations();
</script>
</body>
</html>
