[tool.ruff]
target-version = "py312"
line-length = 120

[tool.ruff.lint]
select = [
    "E",    # pycodestyle errors
    "W",    # pycodestyle warnings
    "F",    # pyflakes
    "B",    # flake8-bugbear (common bugs)
    "S",    # flake8-bandit (security)
    "UP",   # pyupgrade
]
ignore = [
    "E501",   # line too long (we use 120 but some lines are longer)
    "S101",   # assert used (fine in tests)
    "S603",   # subprocess without shell=True (we need this for tesseract/piper)
    "S607",   # partial path in subprocess (tesseract, piper are in PATH)
    "S110",   # try-except-pass (we have intentional ones)
    "B904",   # raise without from (too noisy)
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["S", "B"]  # relax security/bugbear in tests
